name: Deploy Supabase Edge Functions

# Roda automaticamente sempre que smart-service ou asaas-webhook mudam
# na branch main. Também pode ser disparado manualmente na aba Actions
# do GitHub (botão "Run workflow"), por exemplo pra reaplicar um deploy
# sem precisar alterar o código.
on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase-functions.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy smart-service
        run: supabase functions deploy smart-service --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy asaas-webhook (pública, sem verificação de JWT)
        run: supabase functions deploy asaas-webhook --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
